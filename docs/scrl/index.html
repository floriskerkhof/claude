<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="scrl" />
  <meta name="theme-color" content="#faf8f5" />
  <title>scrl</title>
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#faf8f5;--ink:#1a1a1a;--accent:#3b7ef6}
    html,body{height:100%;background:var(--bg);font-family:-apple-system,'Helvetica Neue',sans-serif;-webkit-text-size-adjust:100%;overflow:hidden;user-select:none;-webkit-user-select:none}
    #app{display:flex;flex-direction:column;height:100dvh}

    /* ── header ── */
    header{display:flex;align-items:center;justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 18px 10px;flex-shrink:0;background:var(--bg)}
    .title{font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--ink)}
    #save-btn{background:var(--ink);color:#fff;border:none;border-radius:22px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;min-width:112px;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
    #save-btn:disabled{background:#ccc}
    #save-btn:active{opacity:.8}

    /* ── stage ── */
    #stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #stage{position:relative;width:420px;height:420px;overflow:hidden;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.15);background:#f5f0e8;transform-origin:center center;flex-shrink:0}
    #stage-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;opacity:.4}
    #stage-empty span:first-child{font-size:36px}
    #stage-empty span:last-child{font-size:13px;font-weight:500;color:#777}

    /* ── elements ── */
    .el{position:absolute;transform-origin:center center;touch-action:none;-webkit-tap-highlight-color:transparent;cursor:grab}
    .el:active{cursor:grabbing}
    .el img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;border-radius:inherit}
    .el .stk{display:flex;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:none;line-height:1}
    .el .txt{display:flex;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:none;padding:4px;text-align:center;word-break:break-word;white-space:pre-wrap}

    /* frames */
    .el.fw{background:#fff;padding:7px;box-shadow:0 4px 20px rgba(0,0,0,.18);border-radius:3px}
    .el.fp{background:#fefefe;padding:7px 7px 26px;box-shadow:0 5px 24px rgba(0,0,0,.22);border-radius:3px}
    .el.fs{background:#fff;padding:7px;box-shadow:0 3px 16px rgba(0,0,0,.16);border-radius:2px;
      -webkit-mask-image:radial-gradient(circle at 0 50%,transparent 5px,#fff 5px),radial-gradient(circle at 100% 50%,transparent 5px,#fff 5px),radial-gradient(circle at 50% 0,transparent 5px,#fff 5px),radial-gradient(circle at 50% 100%,transparent 5px,#fff 5px);
      -webkit-mask-size:12px 100%,12px 100%,100% 12px,100% 12px;
      -webkit-mask-position:left,right,top,bottom;
      -webkit-mask-repeat:repeat-y,repeat-y,repeat-x,repeat-x}

    /* selection ring */
    .el.sel{outline:2px dashed rgba(59,126,246,.7);outline-offset:4px}
    .el-ctrl{position:absolute;width:30px;height:30px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;z-index:20;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .btn-del{top:-15px;right:-15px;background:rgba(220,50,50,.9);color:#fff}
    .btn-fwd{top:-15px;left:-15px;background:rgba(30,30,30,.8);color:#fff;font-size:11px}
    .rz-handle{position:absolute;bottom:-13px;right:-13px;width:28px;height:28px;background:#fff;border:2.5px solid rgba(59,126,246,.8);border-radius:50%;cursor:se-resize;touch-action:none;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .el:not(.sel) .el-ctrl,.el:not(.sel) .rz-handle{display:none}

    /* ── frame toolbar ── */
    #frame-bar{position:fixed;bottom:calc(76px + max(0px,env(safe-area-inset-bottom)));left:0;right:0;display:flex;justify-content:center;gap:7px;padding:0 16px;z-index:150;pointer-events:none;opacity:0;transition:opacity .2s}
    #frame-bar.on{opacity:1;pointer-events:all}
    .fr-btn{padding:6px 12px;border-radius:16px;border:1.5px solid #ddd;background:#fff;font-size:12px;font-weight:500;color:#333;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.1);white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .fr-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* ── toolbar ── */
    #toolbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;padding:10px 8px max(14px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid rgba(0,0,0,.07);z-index:100}
    .tb-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 10px;-webkit-tap-highlight-color:transparent;color:var(--ink);min-width:56px}
    .tb-icon{font-size:22px;line-height:1}
    .tb-lbl{font-size:10px;font-weight:500;color:#999;letter-spacing:.3px}

    /* ── drawers ── */
    .drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.13);z-index:400;transform:translateY(105%);transition:transform .28s cubic-bezier(.34,1.1,.64,1);padding-bottom:max(20px,env(safe-area-inset-bottom))}
    .drawer.open{transform:translateY(0)}
    .drw-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 14px}
    .drw-title{font-size:15px;font-weight:600;padding:0 18px 12px;color:var(--ink)}
    #overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:350;display:none}
    #overlay.on{display:block}

    /* sticker grid */
    #stk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 14px 4px;max-height:210px;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .stk-btn{height:46px;background:#f8f5f1;border-radius:10px;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .stk-btn:active{transform:scale(.88)}

    /* bg drawer */
    #bg-colors{display:flex;gap:9px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
    #bg-colors::-webkit-scrollbar{display:none}
    .bg-sw{width:42px;height:42px;border-radius:50%;flex-shrink:0;border:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s}
    .bg-sw.on{border-color:var(--ink);transform:scale(1.15)}
    #btn-bgphoto{margin:0 16px 4px;display:flex;align-items:center;gap:10px;padding:13px 16px;background:#f5f0e8;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--ink);width:calc(100% - 32px);-webkit-tap-highlight-color:transparent}
    #btn-bgclear{margin:8px 16px 0;display:flex;align-items:center;gap:10px;padding:11px 16px;background:#fff2f2;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:500;color:#c0392b;width:calc(100% - 32px);-webkit-tap-highlight-color:transparent;display:none}

    /* text drawer */
    #txt-form{padding:0 16px 4px;display:flex;flex-direction:column;gap:10px}
    #txt-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #e0dbd4;font-size:16px;background:#faf8f5;color:var(--ink);outline:none;resize:none;font-family:inherit}
    #txt-inp:focus{border-color:var(--ink)}
    .txt-fonts{display:flex;gap:7px;flex-wrap:wrap}
    .font-btn{padding:6px 13px;border-radius:16px;border:1.5px solid #ddd;background:#fff;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .font-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
    .txt-colors{display:flex;gap:8px;flex-wrap:wrap}
    .tc-btn{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .tc-btn.on{border-color:#555}
    #btn-addtxt{background:var(--ink);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}

    /* spinner */
    .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">scrl</span>
    <button id="save-btn" disabled>Save &amp; Share</button>
  </header>

  <div id="stage-wrap">
    <div id="stage">
      <div id="stage-empty">
        <span>📷</span>
        <span>Tap Photo to start</span>
      </div>
    </div>
  </div>

  <div id="frame-bar">
    <button class="fr-btn on" data-f="none">No frame</button>
    <button class="fr-btn" data-f="fw">White</button>
    <button class="fr-btn" data-f="fp">Polaroid</button>
    <button class="fr-btn" data-f="fs">Stamp</button>
  </div>

  <div id="toolbar">
    <button class="tb-btn" id="btn-photo"><span class="tb-icon">📷</span><span class="tb-lbl">Photo</span></button>
    <button class="tb-btn" id="btn-sticker"><span class="tb-icon">✦</span><span class="tb-lbl">Sticker</span></button>
    <button class="tb-btn" id="btn-text"><span class="tb-icon" style="font-size:20px;font-weight:800">T</span><span class="tb-lbl">Text</span></button>
    <button class="tb-btn" id="btn-bg"><span class="tb-icon">◧</span><span class="tb-lbl">Background</span></button>
  </div>

  <!-- Sticker drawer -->
  <div class="drawer" id="drw-sticker">
    <div class="drw-handle"></div>
    <p class="drw-title">Stickers</p>
    <div id="stk-grid"></div>
  </div>

  <!-- BG drawer -->
  <div class="drawer" id="drw-bg">
    <div class="drw-handle"></div>
    <p class="drw-title">Background</p>
    <div id="bg-colors"></div>
    <button id="btn-bgphoto"><span style="font-size:18px">🖼</span> Choose a photo as background</button>
    <button id="btn-bgclear"><span style="font-size:18px">✕</span> Remove background photo</button>
  </div>

  <!-- Text drawer -->
  <div class="drawer" id="drw-text">
    <div class="drw-handle"></div>
    <p class="drw-title">Add text</p>
    <div id="txt-form">
      <textarea id="txt-inp" rows="2" placeholder="Type something…"></textarea>
      <div class="txt-fonts">
        <button class="font-btn on" data-font="sys">Default</button>
        <button class="font-btn" data-font="ser">Serif</button>
        <button class="font-btn" data-font="mno">Mono</button>
        <button class="font-btn" data-font="cur">Cursive</button>
        <button class="font-btn" data-font="bld">Bold</button>
      </div>
      <div class="txt-colors">
        <button class="tc-btn on" data-c="#1a1a1a" style="background:#1a1a1a"></button>
        <button class="tc-btn" data-c="#ffffff" style="background:#fff;outline:1px solid #ddd"></button>
        <button class="tc-btn" data-c="#e63946" style="background:#e63946"></button>
        <button class="tc-btn" data-c="#457b9d" style="background:#457b9d"></button>
        <button class="tc-btn" data-c="#2d6a4f" style="background:#2d6a4f"></button>
        <button class="tc-btn" data-c="#f4a261" style="background:#f4a261"></button>
        <button class="tc-btn" data-c="#9b5de5" style="background:#9b5de5"></button>
        <button class="tc-btn" data-c="#f7b731" style="background:#f7b731"></button>
      </div>
      <button id="btn-addtxt">Add to page</button>
    </div>
  </div>

  <div id="overlay"></div>
</div>

<input type="file" id="inp-photo" accept="image/*" style="display:none">
<input type="file" id="inp-bg"    accept="image/*" style="display:none">

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const BASE = 420, EXPORT_SIZE = 1080, SC = EXPORT_SIZE / BASE;

const STICKERS = [
  '❤️','🌸','⭐','✨','🎀','🌷','🍋','🫶','🤍','🌿','🍄','🌺','💫','🦋','🌙',
  '🌈','🔮','🫧','🍓','🌻','🪷','🧸','📮','📌','✂️','🪄','🍰','☁️','🌊','🪸',
  '🌴','🐚','🌅','🎠','🪩','💝','🍒','🫐','🌶️','🎪','🏄','🐝','🦩','🐬','🪐',
  '💐','🌾','🍃','🫚','🎭',
];

const BG_COLORS = [
  '#faf8f5','#f5f0e8','#fff0e8','#fce4ec','#e8f5e9',
  '#e3f2fd','#ede7f6','#f3e5f5','#2c2c2c','#111111',
];

const FONT_MAP = {
  sys: '-apple-system, Helvetica, sans-serif',
  ser: 'Georgia, "Times New Roman", serif',
  mno: '"Courier New", Courier, monospace',
  cur: 'Palatino, "Book Antiqua", serif',
  bld: '-apple-system, Helvetica, sans-serif',
};

// ── State ────────────────────────────────────────────────────────────────────
let els = [];
let bg = { color: '#f5f0e8', img: null };
let selId = null;
let uid = 1, uz = 1;
let txtFont = 'sys', txtColor = '#1a1a1a';
let gesture = null; // active gesture state

// ── Stage scale ──────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');

function stageScale() {
  return Math.min(window.innerWidth - 32, BASE) / BASE;
}
function applyScale() {
  stage.style.transform = `scale(${stageScale()})`;
}
window.addEventListener('resize', applyScale);
applyScale();

// ── Helpers ──────────────────────────────────────────────────────────────────
function getEl(id) { return els.find(e => e.id === id); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function readFile(file) {
  return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
}

function loadImg(src) {
  return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
}

// ── Element CRUD ─────────────────────────────────────────────────────────────
function addEl(el) {
  els.push(el);
  mountEl(el);
  select(el.id);
  updateSaveBtn();
  document.getElementById('stage-empty').style.display = 'none';
}

window.delEl = function(id) {
  els = els.filter(e => e.id !== id);
  document.getElementById('e' + id)?.remove();
  if (selId === id) { selId = null; showFrameBar(false); }
  updateSaveBtn();
  if (!els.length) document.getElementById('stage-empty').style.display = '';
};

window.fwdEl = function(id, ev) {
  ev?.stopPropagation();
  const el = getEl(id); if (!el) return;
  el.z = uz++;
  document.getElementById('e' + id).style.zIndex = el.z;
};

function select(id) {
  if (selId === id) return;
  if (selId) document.getElementById('e' + selId)?.classList.remove('sel');
  selId = id;
  if (id) {
    document.getElementById('e' + id)?.classList.add('sel');
    const el = getEl(id);
    showFrameBar(el?.type === 'photo', el?.frame || 'none');
  } else {
    showFrameBar(false);
  }
}

function deselect() { select(null); }

function mountEl(el) {
  const node = document.createElement('div');
  node.id = 'e' + el.id;
  node.className = 'el';
  node.innerHTML = buildInner(el);
  stage.appendChild(node);
  syncStyle(el.id);
  bindGestures(node, el.id);
}

function buildInner(el) {
  let body = '';
  if (el.type === 'photo') {
    body = `<img src="${el.src}" draggable="false">`;
  } else if (el.type === 'stk') {
    body = `<div class="stk" style="font-size:${el.w * 0.7}px">${el.emoji}</div>`;
  } else {
    const bold = el.font === 'bld' ? 700 : 500;
    body = `<div class="txt" style="font-family:${FONT_MAP[el.font]};color:${el.color};font-size:${el.fs}px;font-weight:${bold}">${esc(el.text)}</div>`;
  }
  return body +
    `<button class="el-ctrl btn-del" onclick="delEl(${el.id})">×</button>` +
    `<button class="el-ctrl btn-fwd" onclick="fwdEl(${el.id},event)">↑</button>` +
    `<div class="rz-handle"></div>`;
}

function syncStyle(id) {
  const el = getEl(id);
  const node = document.getElementById('e' + id);
  if (!el || !node) return;
  node.style.cssText = `left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;transform:translate(-50%,-50%) rotate(${el.rot}deg);z-index:${el.z}`;
  node.classList.remove('fw','fp','fs');
  if (el.type === 'photo' && el.frame && el.frame !== 'none') node.classList.add(el.frame);
  if (el.id === selId) node.classList.add('sel');
}

// ── Gesture handling ─────────────────────────────────────────────────────────
function bindGestures(node, id) {
  node.addEventListener('touchstart', e => onElTouch(e, id), { passive: false });
}

function onElTouch(e, id) {
  e.preventDefault();
  e.stopPropagation();
  select(id);
  const el = getEl(id);
  if (!el) return;

  if (e.target.classList.contains('rz-handle')) {
    gesture = { type: 'rz', id, t0x: e.touches[0].clientX, t0y: e.touches[0].clientY, w0: el.w, h0: el.h, ratio: el.w / el.h };
    return;
  }

  const t = e.touches[0];
  gesture = { type: 'drag', id, t0x: t.clientX, t0y: t.clientY, x0: el.x, y0: el.y };
}

stage.addEventListener('touchstart', e => {
  if (gesture && e.touches.length === 2) {
    // Upgrade drag → pinch
    const el = getEl(gesture.id); if (!el) return;
    const t1 = e.touches[0], t2 = e.touches[1];
    gesture = {
      type: 'pinch', id: gesture.id,
      d0: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY),
      a0: Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX),
      w0: el.w, h0: el.h, rot0: el.rot,
    };
    e.preventDefault();
  } else if (!gesture) {
    deselect();
  }
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (!gesture) return;
  e.preventDefault();
  const sc = stageScale();
  const el = getEl(gesture.id); if (!el) return;

  if (gesture.type === 'drag') {
    if (e.touches.length === 2) {
      // Upgrade to pinch
      const t1 = e.touches[0], t2 = e.touches[1];
      gesture = {
        type: 'pinch', id: gesture.id,
        d0: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY),
        a0: Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX),
        w0: el.w, h0: el.h, rot0: el.rot,
      };
      return;
    }
    const dx = (e.touches[0].clientX - gesture.t0x) / sc;
    const dy = (e.touches[0].clientY - gesture.t0y) / sc;
    el.x = gesture.x0 + dx;
    el.y = gesture.y0 + dy;
    syncStyle(el.id);
  } else if (gesture.type === 'pinch' && e.touches.length >= 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const d = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const a = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX);
    const sf = d / gesture.d0;
    el.w = Math.max(30, gesture.w0 * sf);
    el.h = Math.max(30, gesture.h0 * sf);
    el.rot = gesture.rot0 + (a - gesture.a0) * 180 / Math.PI;
    // Update sticker font size
    if (el.type === 'stk') {
      document.querySelector(`#e${el.id} .stk`).style.fontSize = el.w * 0.7 + 'px';
    }
    syncStyle(el.id);
  } else if (gesture.type === 'rz') {
    const dx = (e.touches[0].clientX - gesture.t0x) / sc;
    const delta = dx;
    el.w = Math.max(40, gesture.w0 + delta);
    el.h = Math.max(40, el.w / gesture.ratio);
    if (el.type === 'stk') document.querySelector(`#e${el.id} .stk`).style.fontSize = el.w * 0.7 + 'px';
    syncStyle(el.id);
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  if (e.touches.length === 0) gesture = null;
});

// ── Frame bar ────────────────────────────────────────────────────────────────
const frameBar = document.getElementById('frame-bar');

function showFrameBar(show, active) {
  frameBar.classList.toggle('on', !!show);
  if (show) {
    document.querySelectorAll('.fr-btn').forEach(b => b.classList.toggle('on', b.dataset.f === (active || 'none')));
  }
}

document.querySelectorAll('.fr-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!selId) return;
    const el = getEl(selId); if (!el || el.type !== 'photo') return;
    el.frame = btn.dataset.f;
    syncStyle(el.id);
    showFrameBar(true, el.frame);
  });
});

// ── Add photo ────────────────────────────────────────────────────────────────
document.getElementById('btn-photo').addEventListener('click', () => document.getElementById('inp-photo').click());

document.getElementById('inp-photo').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const src = await readFile(file);
  e.target.value = '';
  addEl({
    id: uid++, type: 'photo', src, frame: 'fw',
    x: BASE/2 + (Math.random()-.5)*80,
    y: BASE/2 + (Math.random()-.5)*80,
    w: BASE * .54, h: BASE * .54,
    rot: (Math.random()-.5) * 14,
    z: uz++,
  });
});

// ── Add sticker ──────────────────────────────────────────────────────────────
document.getElementById('btn-sticker').addEventListener('click', () => openDrawer('drw-sticker'));

function buildStickerGrid() {
  const g = document.getElementById('stk-grid');
  STICKERS.forEach(em => {
    const b = document.createElement('button');
    b.className = 'stk-btn'; b.textContent = em;
    b.addEventListener('click', () => {
      const sz = BASE * .19;
      addEl({ id: uid++, type: 'stk', emoji: em, x: BASE/2+(Math.random()-.5)*120, y: BASE/2+(Math.random()-.5)*120, w: sz, h: sz, rot: (Math.random()-.5)*24, z: uz++ });
      closeDrawers();
    });
    g.appendChild(b);
  });
}

// ── Add text ─────────────────────────────────────────────────────────────────
document.getElementById('btn-text').addEventListener('click', () => openDrawer('drw-text'));

document.querySelectorAll('.font-btn').forEach(b => {
  b.addEventListener('click', () => { document.querySelectorAll('.font-btn').forEach(x => x.classList.remove('on')); b.classList.add('on'); txtFont = b.dataset.font; });
});
document.querySelectorAll('.tc-btn').forEach(b => {
  b.addEventListener('click', () => { document.querySelectorAll('.tc-btn').forEach(x => x.classList.remove('on')); b.classList.add('on'); txtColor = b.dataset.c; });
});

document.getElementById('btn-addtxt').addEventListener('click', () => {
  const txt = document.getElementById('txt-inp').value.trim(); if (!txt) return;
  addEl({
    id: uid++, type: 'txt', text: txt, font: txtFont, color: txtColor, fs: 20,
    x: BASE/2+(Math.random()-.5)*80, y: BASE/2+(Math.random()-.5)*80,
    w: BASE * .58, h: BASE * .18,
    rot: (Math.random()-.5)*8, z: uz++,
  });
  document.getElementById('txt-inp').value = '';
  closeDrawers();
});

// ── Background ───────────────────────────────────────────────────────────────
document.getElementById('btn-bg').addEventListener('click', () => openDrawer('drw-bg'));
document.getElementById('btn-bgphoto').addEventListener('click', () => document.getElementById('inp-bg').click());
document.getElementById('btn-bgclear').addEventListener('click', () => {
  bg.img = null; renderBg();
  document.getElementById('btn-bgclear').style.display = 'none';
});

document.getElementById('inp-bg').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  bg.img = await readFile(file);
  e.target.value = '';
  renderBg();
  document.getElementById('btn-bgclear').style.display = '';
  closeDrawers();
});

function buildBgSwatches() {
  const cont = document.getElementById('bg-colors');
  BG_COLORS.forEach(c => {
    const sw = document.createElement('button');
    sw.className = 'bg-sw' + (c === bg.color ? ' on' : '');
    sw.style.background = c;
    if (c === '#111111' || c === '#2c2c2c') sw.style.border = '3px solid #666';
    sw.dataset.c = c;
    sw.addEventListener('click', () => { bg.color = c; bg.img = null; renderBg(); document.getElementById('btn-bgclear').style.display = 'none'; updateBgSwatches(); });
    cont.appendChild(sw);
  });
}

function updateBgSwatches() {
  document.querySelectorAll('.bg-sw').forEach(sw => sw.classList.toggle('on', sw.dataset.c === bg.color && !bg.img));
}

function renderBg() {
  if (bg.img) {
    stage.style.backgroundImage = `url(${bg.img})`;
    stage.style.backgroundSize = 'cover';
    stage.style.backgroundPosition = 'center';
  } else {
    stage.style.backgroundImage = 'none';
    stage.style.backgroundColor = bg.color;
  }
}

// ── Drawers ──────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
let activeDrawer = null;

function openDrawer(id) {
  if (activeDrawer) document.getElementById(activeDrawer)?.classList.remove('open');
  activeDrawer = id;
  document.getElementById(id).classList.add('open');
  overlay.classList.add('on');
}
function closeDrawers() {
  if (activeDrawer) document.getElementById(activeDrawer)?.classList.remove('open');
  activeDrawer = null;
  overlay.classList.remove('on');
}
overlay.addEventListener('click', closeDrawers);

// ── Save & Share ──────────────────────────────────────────────────────────────
function updateSaveBtn() {
  document.getElementById('save-btn').disabled = els.length === 0;
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div>';
  try {
    const c = await exportCanvas();
    const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.97));
    const file = new File([blob], 'scrl.jpg', { type: 'image/jpeg' });
    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: 'scrl' });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'scrl.jpg'; a.click();
      URL.revokeObjectURL(url);
    }
  } catch(err) {
    if (err.name !== 'AbortError') alert('Could not save. Please try again.');
  } finally {
    btn.innerHTML = 'Save &amp; Share';
    updateSaveBtn();
  }
});

// ── Export to canvas ─────────────────────────────────────────────────────────
async function exportCanvas() {
  const c = document.createElement('canvas');
  c.width = EXPORT_SIZE; c.height = EXPORT_SIZE;
  const ctx = c.getContext('2d');

  // Background
  if (bg.img) {
    const img = await loadImg(bg.img);
    coverDraw(ctx, img, 0, 0, EXPORT_SIZE, EXPORT_SIZE);
  } else {
    ctx.fillStyle = bg.color;
    ctx.fillRect(0, 0, EXPORT_SIZE, EXPORT_SIZE);
    // Paper grain
    ctx.save(); ctx.globalAlpha = 0.018;
    for (let i = 0; i < 12000; i++) {
      const v = Math.random() < .5 ? 255 : 0;
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(Math.random() * EXPORT_SIZE, Math.random() * EXPORT_SIZE, 1.4, 1.4);
    }
    ctx.restore();
  }

  // Elements by z-order
  const sorted = [...els].sort((a, b) => a.z - b.z);

  for (const el of sorted) {
    ctx.save();
    ctx.translate(el.x * SC, el.y * SC);
    ctx.rotate(el.rot * Math.PI / 180);
    const w = el.w * SC, h = el.h * SC;

    if (el.type === 'photo') {
      const img = await loadImg(el.src);
      drawPhotoExport(ctx, img, w, h, el.frame);
    } else if (el.type === 'stk') {
      ctx.font = `${w * 0.7}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(el.emoji, 0, 0);
    } else {
      const bold = el.font === 'bld' ? 700 : 500;
      const fs = el.fs * SC;
      ctx.font = `${bold} ${fs}px ${FONT_MAP[el.font]}`;
      ctx.fillStyle = el.color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const lines = el.text.split('\n');
      lines.forEach((line, i) => ctx.fillText(line, 0, (i - (lines.length - 1) / 2) * fs * 1.3));
    }

    ctx.restore();
  }

  return c;
}

function drawPhotoExport(ctx, img, w, h, frame) {
  const shadow = (blur, oy) => { ctx.shadowColor = 'rgba(0,0,0,.2)'; ctx.shadowBlur = blur; ctx.shadowOffsetY = oy; };
  const noShadow = () => { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; };

  if (frame === 'fw') {
    const b = w * .025;
    shadow(36, 10); ctx.fillStyle = '#fff'; rrect(ctx, -w/2, -h/2, w, h, 6); ctx.fill(); noShadow();
    ctx.save(); rrect(ctx, -w/2+b, -h/2+b, w-b*2, h-b*2, 3); ctx.clip();
    coverDraw(ctx, img, -w/2+b, -h/2+b, w-b*2, h-b*2); ctx.restore();
  } else if (frame === 'fp') {
    const pad = w * .055, padB = w * .21, ph = h - pad - padB;
    shadow(40, 12); ctx.fillStyle = '#fefefe'; rrect(ctx, -w/2, -h/2, w, h, 5); ctx.fill(); noShadow();
    ctx.save(); rrect(ctx, -w/2+pad, -h/2+pad, w-pad*2, ph, 2); ctx.clip();
    coverDraw(ctx, img, -w/2+pad, -h/2+pad, w-pad*2, ph); ctx.restore();
  } else if (frame === 'fs') {
    const b = w * .038;
    shadow(28, 8); drawStamp(ctx, -w/2, -h/2, w, h, 16); ctx.fillStyle = '#fff'; ctx.fill(); noShadow();
    ctx.save(); ctx.rect(-w/2+b, -h/2+b, w-b*2, h-b*2); ctx.clip();
    coverDraw(ctx, img, -w/2+b, -h/2+b, w-b*2, h-b*2); ctx.restore();
  } else {
    shadow(20, 6); ctx.save(); rrect(ctx, -w/2, -h/2, w, h, 5); ctx.clip(); noShadow();
    coverDraw(ctx, img, -w/2, -h/2, w, h); ctx.restore();
  }
}

function drawStamp(ctx, x, y, w, h, r) {
  ctx.beginPath();
  for (let i = x + r; i < x + w - r; i += r * 2) { ctx.arc(i + r/2, y, r/2, Math.PI, 0, true); }
  ctx.lineTo(x + w, y);
  for (let i = y + r; i < y + h - r; i += r * 2) { ctx.arc(x + w, i + r/2, r/2, -Math.PI/2, Math.PI/2, true); }
  ctx.lineTo(x + w, y + h);
  for (let i = x + w - r; i > x + r; i -= r * 2) { ctx.arc(i - r/2, y + h, r/2, 0, Math.PI, true); }
  ctx.lineTo(x, y + h);
  for (let i = y + h - r; i > y + r; i -= r * 2) { ctx.arc(x, i - r/2, r/2, Math.PI/2, -Math.PI/2, true); }
  ctx.closePath();
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

function coverDraw(ctx, img, dx, dy, dw, dh) {
  const ir = img.naturalWidth / img.naturalHeight, dr = dw / dh;
  let sx, sy, sw, sh;
  if (ir > dr) { sh = img.naturalHeight; sw = sh*dr; sx = (img.naturalWidth-sw)/2; sy = 0; }
  else          { sw = img.naturalWidth;  sh = sw/dr; sx = 0; sy = (img.naturalHeight-sh)/2; }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderBg();
buildStickerGrid();
buildBgSwatches();
</script>
