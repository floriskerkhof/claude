<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floris Kerkhof – Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0d1117;--surface2:#161b27;--surface3:#1e2637;
  --border:#2a3347;--text:#e2e8f0;--muted:#7a8faa;
  --accent:#4a9eff;--accent2:#7bc4ff;--green:#22d3a0;--red:#f87171;
  --yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;--r:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.65;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:50px}
.nav-logo{font-weight:800;font-size:14px;color:var(--accent)}
main{max-width:900px;margin:0 auto;padding:72px 24px 80px}
h1{font-size:clamp(28px,5vw,44px);font-weight:900;line-height:1.15;margin-bottom:12px;background:linear-gradient(135deg,#e2e8f0 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:var(--muted);font-size:clamp(14px,2vw,16px);margin-bottom:48px;max-width:520px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 22px 18px;text-decoration:none;transition:border-color .15s,background .15s,transform .12s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-2px)}
.card-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:7px;line-height:1.3}
.card-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:16px;min-height:40px}
.card-url{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.4px;opacity:.7}
.card-arrow{position:absolute;top:20px;right:20px;color:var(--accent);opacity:0;font-size:18px;transition:opacity .15s,transform .15s}
.card:hover .card-arrow{opacity:1;transform:translateX(3px)}
.skeleton{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.skel-title{height:18px;background:var(--surface3);border-radius:4px;width:60%;margin-bottom:10px}
.skel-line{height:12px;background:var(--surface3);border-radius:4px;margin-bottom:6px}
.skel-line.short{width:40%}
.error-msg{color:var(--red);font-size:14px;margin-top:16px}
</style>
</head>
<body>
<nav><span class="nav-logo">FK</span></nav>
<main>
  <h1>Tools & Explorers</h1>
  <p class="sub">Interactive pages for rates trading, risk, and more. Click any card to open the tool.</p>
  <div class="grid" id="grid">
    <div class="skeleton"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skeleton"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    <div class="skeleton"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
  </div>
</main>
<script>
const REPO = 'floriskerkhof/claude';
const BRANCH = 'main';

function slugToLabel(name) {
  return name.replace(/\.html$/, '').replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase())
    .replace(/\bPnl\b/, 'PnL')
    .replace(/\bSabr\b/, 'SABR')
    .replace(/\bYen To Eur\b/, 'Yen → EUR');
}

async function fetchTitle(rawUrl) {
  try {
    const res = await fetch(rawUrl);
    if (!res.ok) return null;
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';
    while (text.length < 6000) {
      const { done, value } = await reader.read();
      if (done) break;
      text += decoder.decode(value, { stream: true });
    }
    reader.cancel().catch(() => {});
    const title = text.match(/<title>([^<]+)<\/title>/i)?.[1]?.trim() || null;
    const desc = text.match(/class="hero-sub"[^>]*>([\s\S]*?)<\/p>/i)?.[1]
      ?.replace(/<[^>]+>/g, '')?.replace(/\s+/g, ' ')?.trim() || null;
    return { title, desc };
  } catch {
    return null;
  }
}

async function loadPages() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/docs?ref=${BRANCH}`);
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const entries = await res.json();

    // Top-level .html files (excluding this index)
    const filePages = entries
      .filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html')
      .map(f => ({ path: f.name, url: f.name }));

    // Subdirectories that contain an index.html
    const dirs = entries.filter(f => f.type === 'dir');
    const dirChecks = await Promise.all(dirs.map(async d => {
      try {
        const r = await fetch(`https://api.github.com/repos/${REPO}/contents/docs/${d.name}?ref=${BRANCH}`);
        if (!r.ok) return null;
        const children = await r.json();
        const hasIndex = Array.isArray(children) && children.some(c => c.type === 'file' && c.name === 'index.html');
        return hasIndex ? { path: `${d.name}/index.html`, url: `${d.name}/` } : null;
      } catch { return null; }
    }));
    const dirPages = dirChecks.filter(Boolean);

    const pages = [...filePages, ...dirPages];

    if (pages.length === 0) {
      grid.innerHTML = '<p style="color:var(--muted)">No pages found yet.</p>';
      return;
    }

    const metas = await Promise.all(pages.map(p =>
      fetchTitle(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/docs/${p.path}`)
    ));

    grid.innerHTML = '';
    pages.forEach((p, i) => {
      const meta = metas[i];
      const title = meta?.title || slugToLabel(p.path);
      const desc = meta?.desc || '';
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.url;
      a.innerHTML = `
        <div class="card-title">${escHtml(title)}</div>
        <div class="card-desc">${escHtml(desc)}</div>
        <div class="card-url">${escHtml(p.url)}</div>
        <span class="card-arrow">→</span>
      `;
      grid.appendChild(a);
    });
  } catch (err) {
    grid.innerHTML = `<p class="error-msg">Could not load pages: ${escHtml(String(err))}</p>`;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPages();
</script>
</body>
</html>
