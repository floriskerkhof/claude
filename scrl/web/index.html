<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="scrl" />
  <meta name="theme-color" content="#faf8f5" />
  <title>scrl</title>
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --ink: #1a1a1a;
      --muted: #999;
      --chip-bg: #f0ece8;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      flex-shrink: 0;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    #save-btn {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 22px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s, transform .1s;
      min-width: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #save-btn:disabled { background: #ccc; }
    #save-btn:active { transform: scale(0.96); }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 0 16px;
    }

    #canvas-container {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #preview {
      display: block;
      border-radius: var(--radius);
    }

    /* ── Hint ── */
    #hint {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding: 8px 20px 0;
      flex-shrink: 0;
      min-height: 28px;
    }

    /* ── Template picker ── */
    #picker-section {
      flex-shrink: 0;
      padding-top: 12px;
    }

    .picker-label {
      font-size: 11px;
      font-weight: 600;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding: 0 20px 8px;
    }

    #template-list {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    #template-list::-webkit-scrollbar { display: none; }

    .tpl-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 12px;
      border-radius: 20px;
      background: var(--chip-bg);
      border: 1.5px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .tpl-chip.active {
      background: var(--ink);
      border-color: var(--ink);
    }
    .tpl-chip .chip-emoji { font-size: 13px; }
    .tpl-chip .chip-name {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.2px;
    }
    .tpl-chip.active .chip-name { color: #fff; }
    .tpl-chip .chip-count {
      font-size: 11px;
      color: #aaa;
    }
    .tpl-chip.active .chip-count { color: rgba(255,255,255,0.5); }

    /* ── Color swatches ── */
    #bg-section {
      flex-shrink: 0;
      padding: 10px 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bg-label {
      font-size: 11px;
      font-weight: 600;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 1.1px;
    }
    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
      flex-shrink: 0;
    }
    .swatch.active { border-color: var(--ink); transform: scale(1.15); }
    .swatch:active { transform: scale(0.9); }

    /* ── Spacer ── */
    .spacer { flex: 1; }

    /* ── Bottom safe area ── */
    .bottom-pad {
      flex-shrink: 0;
      height: max(16px, var(--safe-bottom));
    }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">scrl</span>
    <button id="save-btn" disabled>Save &amp; Share</button>
  </header>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="preview"></canvas>
    </div>
  </div>

  <p id="hint">Tap a slot to add a photo</p>

  <div id="picker-section">
    <p class="picker-label">Layout</p>
    <div id="template-list"></div>
  </div>

  <div id="bg-section">
    <span class="bg-label">Background</span>
  </div>

  <div class="spacer"></div>
  <div class="bottom-pad"></div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" />

<script>
// ─── Templates ───────────────────────────────────────────────────────────────
const TEMPLATES = [
  {
    id: 'grid-2x2', name: '2×2 Grid', emoji: '▦', photoCount: 4,
    bg: '#faf8f5',
    slots: [
      { x:.02, y:.02, w:.47, h:.47, shape:'rect' },
      { x:.51, y:.02, w:.47, h:.47, shape:'rect' },
      { x:.02, y:.51, w:.47, h:.47, shape:'rect' },
      { x:.51, y:.51, w:.47, h:.47, shape:'rect' },
    ],
  },
  {
    id: 'grid-3x3', name: '3×3 Grid', emoji: '⊞', photoCount: 9,
    bg: '#faf8f5',
    slots: [
      { x:.01, y:.01, w:.32, h:.32, shape:'rect' },
      { x:.34, y:.01, w:.32, h:.32, shape:'rect' },
      { x:.67, y:.01, w:.32, h:.32, shape:'rect' },
      { x:.01, y:.34, w:.32, h:.32, shape:'rect' },
      { x:.34, y:.34, w:.32, h:.32, shape:'rect' },
      { x:.67, y:.34, w:.32, h:.32, shape:'rect' },
      { x:.01, y:.67, w:.32, h:.32, shape:'rect' },
      { x:.34, y:.67, w:.32, h:.32, shape:'rect' },
      { x:.67, y:.67, w:.32, h:.32, shape:'rect' },
    ],
  },
  {
    id: 'spotlight', name: 'Spotlight', emoji: '✦', photoCount: 3,
    bg: '#fff9f0',
    slots: [
      { x:.05, y:.03, w:.90, h:.55, shape:'rect' },
      { x:.03, y:.60, w:.45, h:.37, shape:'rect' },
      { x:.52, y:.60, w:.45, h:.37, shape:'rect' },
    ],
  },
  {
    id: 'collage', name: 'Collage', emoji: '✂', photoCount: 4,
    bg: '#f5f0eb',
    slots: [
      { x:.03, y:.04, w:.50, h:.44, rot:-3, shape:'polaroid', z:1 },
      { x:.45, y:.08, w:.50, h:.44, rot:4,  shape:'polaroid', z:2 },
      { x:.05, y:.50, w:.48, h:.44, rot:2,  shape:'polaroid', z:1 },
      { x:.47, y:.54, w:.48, h:.44, rot:-2, shape:'polaroid', z:2 },
    ],
  },
  {
    id: 'strip', name: 'Film Strip', emoji: '🎞', photoCount: 3,
    bg: '#1a1a1a',
    slots: [
      { x:.05, y:.10, w:.90, h:.25, shape:'rect' },
      { x:.05, y:.375, w:.90, h:.25, shape:'rect' },
      { x:.05, y:.65, w:.90, h:.25, shape:'rect' },
    ],
  },
  {
    id: 'circles', name: 'Bubbles', emoji: '◉', photoCount: 3,
    bg: '#e8f4f8',
    slots: [
      { x:.10, y:.05, w:.55, h:.55, shape:'circle', z:2 },
      { x:.45, y:.38, w:.50, h:.50, shape:'circle', z:1 },
      { x:.02, y:.42, w:.40, h:.40, shape:'circle', z:1 },
    ],
  },
  {
    id: 'duo', name: 'Duo', emoji: '◫', photoCount: 2,
    bg: '#faf8f5',
    slots: [
      { x:.02, y:.02, w:.47, h:.96, shape:'rect' },
      { x:.51, y:.02, w:.47, h:.96, shape:'rect' },
    ],
  },
  {
    id: 'hero-small', name: 'Hero + 2', emoji: '⬛', photoCount: 3,
    bg: '#faf8f5',
    slots: [
      { x:.02, y:.02, w:.96, h:.60, shape:'rect' },
      { x:.02, y:.64, w:.47, h:.34, shape:'rect' },
      { x:.51, y:.64, w:.47, h:.34, shape:'rect' },
    ],
  },
  {
    id: 'polaroid-row', name: 'Polaroids', emoji: '📷', photoCount: 3,
    bg: '#f0ece8',
    slots: [
      { x:.02, y:.18, w:.30, h:.38, rot:-5, shape:'polaroid' },
      { x:.34, y:.14, w:.32, h:.40, rot:0,  shape:'polaroid' },
      { x:.66, y:.18, w:.30, h:.38, rot:4,  shape:'polaroid' },
    ],
  },
  {
    id: 'one', name: 'Solo', emoji: '◼', photoCount: 1,
    bg: '#faf8f5',
    slots: [
      { x:.04, y:.04, w:.92, h:.92, shape:'rect' },
    ],
  },
];

const BG_COLORS = [
  '#faf8f5', '#fff9f0', '#f5f0eb', '#f0ece8',
  '#e8f4f8', '#f0f4ee', '#f4eef4', '#1a1a1a',
];

// ─── State ────────────────────────────────────────────────────────────────────
let currentTemplate = TEMPLATES[0];
let photos = new Array(currentTemplate.photoCount).fill(null); // HTMLImageElement | null
let currentBg = currentTemplate.bg;
let pendingSlot = -1;

// ─── Canvas setup ────────────────────────────────────────────────────────────
const EXPORT_SIZE = 1080;
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');
canvas.width = EXPORT_SIZE;
canvas.height = EXPORT_SIZE;

function canvasDisplaySize() {
  const pad = 32;
  return Math.min(window.innerWidth - pad, 420);
}

function resizeCanvas() {
  const s = canvasDisplaySize();
  canvas.style.width = s + 'px';
  canvas.style.height = s + 'px';
  document.getElementById('canvas-container').style.width = s + 'px';
  document.getElementById('canvas-container').style.height = s + 'px';
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
function drawSlot(slot, img, s) {
  const x = slot.x * s, y = slot.y * s;
  const w = slot.w * s, h = slot.h * s;
  const rot = (slot.rot || 0) * Math.PI / 180;
  const isPolaroid = slot.shape === 'polaroid';
  const isCircle = slot.shape === 'circle';
  const captionH = isPolaroid ? Math.max(16, h * 0.12) : 0;
  const photoH = h - captionH;

  ctx.save();
  // Translate to center of slot for rotation
  ctx.translate(x + w / 2, y + h / 2);
  ctx.rotate(rot);

  if (isPolaroid) {
    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.18)';
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 6;
    // White polaroid card
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, h, 4);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    // Photo area
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, photoH, 2);
    ctx.clip();
    if (img) drawCover(img, -w/2, -h/2, w, photoH);
    else drawEmpty(-w/2, -h/2, w, photoH);
    ctx.restore();
  } else if (isCircle) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, w / 2, 0, Math.PI * 2);
    ctx.clip();
    if (img) drawCover(img, -w/2, -h/2, w, h);
    else drawEmpty(-w/2, -h/2, w, h);
    ctx.restore();
  } else {
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, -w/2, -h/2, w, h, 4);
    ctx.clip();
    if (img) drawCover(img, -w/2, -h/2, w, h);
    else drawEmpty(-w/2, -h/2, w, h);
    ctx.restore();
  }

  ctx.restore();
}

function drawCover(img, dx, dy, dw, dh) {
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const dstRatio = dw / dh;
  let sx, sy, sw, sh;
  if (imgRatio > dstRatio) {
    sh = img.naturalHeight;
    sw = sh * dstRatio;
    sx = (img.naturalWidth - sw) / 2;
    sy = 0;
  } else {
    sw = img.naturalWidth;
    sh = sw / dstRatio;
    sx = 0;
    sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

function drawEmpty(x, y, w, h) {
  ctx.fillStyle = '#ddd8d0';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#b0aa9f';
  ctx.font = `${Math.min(w, h) * 0.18}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', x + w / 2, y + h / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function render() {
  ctx.clearRect(0, 0, EXPORT_SIZE, EXPORT_SIZE);
  // Background
  ctx.fillStyle = currentBg;
  ctx.fillRect(0, 0, EXPORT_SIZE, EXPORT_SIZE);

  // Sort by z-index
  const sorted = currentTemplate.slots.map((s, i) => ({ ...s, _i: i }));
  sorted.sort((a, b) => (a.z || 0) - (b.z || 0));

  for (const slot of sorted) {
    drawSlot(slot, photos[slot._i], EXPORT_SIZE);
  }

  updateHint();
  updateSaveBtn();
}

// ─── Hit testing ─────────────────────────────────────────────────────────────
function hitTest(cx, cy) {
  // cx, cy are in display pixels relative to canvas element
  const s = canvasDisplaySize();
  const scale = EXPORT_SIZE / s;
  const ex = cx * scale;
  const ey = cy * scale;

  // Test slots in reverse z-order (top first)
  const sorted = currentTemplate.slots.map((sl, i) => ({ ...sl, _i: i }));
  sorted.sort((a, b) => (b.z || 0) - (a.z || 0));

  for (const slot of sorted) {
    const x = slot.x * EXPORT_SIZE, y = slot.y * EXPORT_SIZE;
    const w = slot.w * EXPORT_SIZE, h = slot.h * EXPORT_SIZE;
    const rot = -(slot.rot || 0) * Math.PI / 180;
    const cx2 = x + w / 2, cy2 = y + h / 2;
    // Rotate point into slot local space
    const dx = ex - cx2, dy = ey - cy2;
    const lx = dx * Math.cos(rot) - dy * Math.sin(rot);
    const ly = dx * Math.sin(rot) + dy * Math.cos(rot);
    if (lx >= -w/2 && lx <= w/2 && ly >= -h/2 && ly <= h/2) {
      return slot._i;
    }
  }
  return -1;
}

// ─── File input ───────────────────────────────────────────────────────────────
const fileInput = document.getElementById('file-input');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file || pendingSlot < 0) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      photos[pendingSlot] = img;
      pendingSlot = -1;
      fileInput.value = '';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

// ─── Canvas click/tap ─────────────────────────────────────────────────────────
document.getElementById('canvas-container').addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const slot = hitTest(cx, cy);
  if (slot < 0) return;

  if (photos[slot]) {
    // Existing photo: offer replace/remove
    if (confirm('Replace or remove this photo?\n\nOK = Replace   Cancel = Remove')) {
      pendingSlot = slot;
      fileInput.click();
    } else {
      photos[slot] = null;
      render();
    }
  } else {
    pendingSlot = slot;
    fileInput.click();
  }
});

// ─── Template picker ──────────────────────────────────────────────────────────
function buildTemplatePicker() {
  const list = document.getElementById('template-list');
  list.innerHTML = '';
  for (const t of TEMPLATES) {
    const chip = document.createElement('button');
    chip.className = 'tpl-chip' + (t.id === currentTemplate.id ? ' active' : '');
    chip.innerHTML = `<span class="chip-emoji">${t.emoji}</span><span class="chip-name">${t.name}</span><span class="chip-count">${t.photoCount}p</span>`;
    chip.addEventListener('click', () => selectTemplate(t));
    list.appendChild(chip);
  }
}

function selectTemplate(t) {
  const prev = photos;
  currentTemplate = t;
  photos = new Array(t.photoCount).fill(null);
  for (let i = 0; i < Math.min(prev.length, t.photoCount); i++) {
    photos[i] = prev[i];
  }
  currentBg = t.bg;
  updateSwatchActive();
  buildTemplatePicker();
  render();
}

// ─── Background color picker ──────────────────────────────────────────────────
function buildBgPicker() {
  const section = document.getElementById('bg-section');
  for (const color of BG_COLORS) {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (color === currentBg ? ' active' : '');
    sw.style.background = color;
    sw.style.border = color === '#1a1a1a' ? '2px solid #555' : '2px solid transparent';
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      currentBg = color;
      updateSwatchActive();
      render();
    });
    section.appendChild(sw);
  }
}

function updateSwatchActive() {
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.color === currentBg);
  });
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
function updateHint() {
  const filled = photos.filter(Boolean).length;
  const hint = document.getElementById('hint');
  if (filled === 0) {
    hint.textContent = 'Tap a slot to add a photo';
  } else if (filled < currentTemplate.photoCount) {
    const left = currentTemplate.photoCount - filled;
    hint.textContent = `${left} more slot${left > 1 ? 's' : ''} to fill`;
  } else {
    hint.textContent = 'All slots filled — ready to save!';
  }
}

function updateSaveBtn() {
  const filled = photos.filter(Boolean).length;
  document.getElementById('save-btn').disabled = filled === 0;
}

// ─── Save & Share ─────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.97));
    const file = new File([blob], 'scrl-page.jpg', { type: 'image/jpeg' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'scrl page',
      });
    } else {
      // Fallback: trigger download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'scrl-page.jpg';
      a.click();
      URL.revokeObjectURL(url);
    }
  } catch (e) {
    if (e.name !== 'AbortError') alert('Could not save. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save & Share';
    updateSaveBtn();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
resizeCanvas();
buildTemplatePicker();
buildBgPicker();
render();

window.addEventListener('resize', () => { resizeCanvas(); });
</script>
</body>
</html>
